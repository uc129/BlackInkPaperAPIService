name: Build and deploy BlackInkPaper

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.x'

      - name: Build API
        run: dotnet build BlackInkPaperAPIService/BlackInkPaperAPIService.csproj --configuration Release

      - name: Build Admin
        run: dotnet build BlackInkPaperAdmin/BlackInkPaperAdmin.csproj --configuration Release

      - name: Publish API
        run: dotnet publish BlackInkPaperAPIService/BlackInkPaperAPIService.csproj -c Release -o ./publish/api

      - name: Publish Admin
        run: dotnet publish BlackInkPaperAdmin/BlackInkPaperAdmin.csproj -c Release -o ./publish/admin

      - name: Upload API artifact
        uses: actions/upload-artifact@v4
        with:
          name: api-app
          path: ./publish/api

      - name: Upload Admin artifact
        uses: actions/upload-artifact@v4
        with:
          name: admin-app
          path: ./publish/admin

  deploy-api:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download API artifact
        uses: actions/download-artifact@v4
        with:
          name: api-app
          path: ./api-app

      - name: Deploy API to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'BlackInkPaperAPIService'
          slot-name: 'Production'
          package: ./api-app
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_2381AE175AE8441B820876C1CC270970 }}

  deploy-admin:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download Admin artifact
        uses: actions/download-artifact@v4
        with:
          name: admin-app
          path: ./admin-app

      - name: Deploy Admin to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'BlackInkPaper-Admin'
          slot-name: 'Production'
          package: ./admin-app
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_ADMIN }}
